services:
  - type: web
    name: voting-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: MONGODB_URL
        sync: false # Set this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 18.0.0
