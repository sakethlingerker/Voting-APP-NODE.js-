<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVote - E-Voting Platform</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="bg-animation"></div>

    <div class="container center-container">
        <div class="glass-card">
            <h2 id="form-title">Welcome Back</h2>
            <p class="text-center" id="form-subtitle">Enter your details to cast your vote</p>
            
            <div id="alert-message" class="alert"></div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label for="login-aadhar">Aadhar Card Number</label>
                    <input type="text" id="login-aadhar" placeholder="12-digit number" required pattern="\d{12}" title="Must be exactly 12 digits">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn mt-4">Login to Vote</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="hidden">
                <div class="form-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="signup-aadhar">Aadhar Card Number</label>
                    <input type="text" id="signup-aadhar" placeholder="12-digit number" required pattern="\d{12}" title="Must be exactly 12 digits">
                </div>
                <div class="form-group">
                    <label for="signup-age">Age</label>
                    <input type="number" id="signup-age" placeholder="18" min="18" required>
                </div>
                <div class="form-group">
                    <label for="signup-address">Address</label>
                    <input type="text" id="signup-address" placeholder="State, City" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="Create password" required>
                </div>
                <button type="submit" class="btn mt-4">Create Account</button>
            </form>

            <div class="text-center mt-8">
                <p id="toggle-text">Don't have an account? <span class="toggle-link" id="toggle-btn">Sign up</span></p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
